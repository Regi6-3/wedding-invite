<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Админка с близкими</title>
  <style>td,th{border:1px solid #ccc;padding:8px;} table{border-collapse:collapse;}</style>
</head>
<body>
<h1>Гости и их близкие</h1>
<div id="content"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  db.collection("guests").get().then(snap => {
    let html = '';
    snap.forEach(doc => {
      let d = doc.data();
      html += `<h3>${d.name}</h3><p>Придёт: ${d.attending ? 'Да' : 'Нет'}</p>`;
      if (d.companions && d.companions.length) {
        html += `<table><tr><th>Имя</th><th>Трансфер</th><th>Алкоголь</th><th>Остановка</th><th>След. день</th></tr>`;
        d.companions.forEach(c => {
          html += `<tr><td>${c.name}</td><td>${c.transfer}</td><td>${c.alcohol}</td><td>${c.accommodation}</td><td>${c.nextDay}</td></tr>`;
        });
        html += `</table>`;
      } else {
        html += `<p>Нет близких</p>`;
      }
      html += `<hr>`;
    });
    document.getElementById('content').innerHTML = html;
  });
</script>
</body>
</html>
