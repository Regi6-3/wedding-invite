<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отладка: структура companions</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
    .guest { border-bottom: 1px solid #ccc; margin-bottom: 20px; }
  </style>
</head>
<body>
<h1>Проверка структуры companions в Firebase</h1>
<div id="debug"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  async function debugCompanions() {
    const container = document.getElementById('debug');
    try {
      const snapshot = await db.collection("guests").get();
      if (snapshot.empty) {
        container.innerHTML = '<p>Нет документов</p>';
        return;
      }
      let html = '';
      snapshot.forEach(doc => {
        const d = doc.data();
        html += `<div class="guest">
          <h2>Гость: ${d.name}</h2>
          <p>attending: ${d.attending}</p>
          <p>Поле companions:</p>
          <pre>${JSON.stringify(d.companions, null, 2)}</pre>
          <p>Тип companions: ${Array.isArray(d.companions) ? 'массив' : typeof d.companions}</p>
          ${Array.isArray(d.companions) && d.companions.length ? `<p>Первый элемент: ${JSON.stringify(d.companions[0])}</p>` : ''}
        </div>`;
      });
      container.innerHTML = html;
    } catch(e) {
      container.innerHTML = '<p>Ошибка: ' + e.message + '</p>';
    }
  }
  debugCompanions();
</script>
</body>
</html>
