<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Список гостей</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0e0; margin: 0; padding: 20px; }
    .guest { background: white; border-radius: 16px; padding: 16px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .name { font-size: 1.6rem; font-weight: bold; color: #6b4c3b; }
    .status { display: inline-block; background: #6b4c3b; color: white; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; margin-left: 10px; }
    .date { color: gray; font-size: 0.8rem; margin: 8px 0; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #e0e0d0; }
    .companion { margin: 8px 0; padding: 6px; background: #f9f9f0; border-radius: 8px; }
    .companion strong { color: #6b4c3b; }
  </style>
</head>
<body>
<h1>📋 Все ответы гостей</h1>
<div id="root">Загрузка...</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  async function loadAll() {
    const container = document.getElementById('root');
    try {
      const snapshot = await db.collection("guests").orderBy("timestamp", "desc").get();
      if (snapshot.empty) {
        container.innerHTML = '<p>Нет ответов</p>';
        return;
      }
      let html = '';
      snapshot.forEach(doc => {
        const data = doc.data();
        const attending = data.attending ? '✅ Придёт' : '❌ Не придёт';
        html += `<div class="guest">
          <div class="name">${escapeHtml(data.name)} <span class="status">${attending}</span></div>
          <div class="date">📅 ${formatDate(data.timestamp)}</div>
          
          <h3>Основной гость</h3>
          <table>
            <tr><th>Трансфер</th><th>Алкоголь</th><th>Остановка в Казани</th><th>Останется на след. день</th></tr>
            <tr>
              <td>${escapeHtml(data.transfer)}</td>
              <td>${escapeHtml(data.alcohol)}</td>
              <td>${escapeHtml(data.accommodation)}</td>
              <td>${escapeHtml(data.nextDay)}</td>
            </tr>
          </table>`;

        // Близкие (companions)
        if (data.companions && Array.isArray(data.companions) && data.companions.length > 0) {
          html += `<h3>👥 Близкие (${data.companions.length} чел.)</h3>`;
          html += `<div style="margin-bottom: 10px;">`;
          data.companions.forEach((c, idx) => {
            html += `<div class="companion">
              <strong>${escapeHtml(c.name)}</strong><br>
              Трансфер: ${escapeHtml(c.transfer)}<br>
              Алкоголь: ${escapeHtml(c.alcohol)}<br>
              Остановка: ${escapeHtml(c.accommodation)}<br>
              След. день: ${escapeHtml(c.nextDay)}<br>
            </div>`;
          });
          html += `</div>`;
        } else {
          html += `<p style="color: gray;">Близкие не добавлены</p>`;
        }
        html += `</div>`;
      });
      container.innerHTML = html;
    } catch (err) {
      console.error(err);
      container.innerHTML = '<p>Ошибка загрузки: ' + err.message + '</p>';
    }
  }

  function escapeHtml(str) {
    if (!str) return '—';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function formatDate(ts) {
    if (!ts || !ts.toDate) return '—';
    return ts.toDate().toLocaleString('ru-RU');
  }

  loadAll();
</script>
</body>
</html>
