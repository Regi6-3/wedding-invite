<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админка свадьбы</title>
  <style>
    body { font-family: system-ui; background: #f0f2f5; padding: 20px; }
    .guest-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #2c3e2f; margin-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; background: white; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f3f1ea; }
    .info { margin-bottom: 15px; }
  </style>
</head>
<body>
<h1>📋 Все гости и их дополнительные анкеты</h1>
<div id="allGuests">Загрузка...</div>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  async function loadAllGuests() {
    const container = document.getElementById('allGuests');
    try {
      const snapshot = await db.collection("guests").orderBy("timestamp", "desc").get();
      if (snapshot.empty) { container.innerHTML = '<p>Нет ответов</p>'; return; }
      let html = '';
      for (const guestDoc of snapshot.docs) {
        const g = guestDoc.data();
        html += `<div class="guest-card">
          <h2>${g.name || 'Без имени'}</h2>
          <div class="info">✅ ${g.attending ? 'Придёт' : 'Не придёт'} | 📅 ${g.timestamp?.toDate().toLocaleString() || '—'}</div>
          <div class="info"><strong>Основная анкета:</strong> Трансфер: ${g.transfer || '—'}, Алкоголь: ${g.alcohol || '—'}, След. день: ${g.nextDay || '—'}, Ночёвка: ${g.overnight || '—'}, Диета: ${g.diet || '—'}</div>`;
        const compSnap = await guestDoc.ref.collection("companions").orderBy("timestamp").get();
        if (!compSnap.empty) {
          html += `<h3>📄 Дополнительные анкеты (${compSnap.size})</h3>
          <table><thead><tr><th>Имя</th><th>Трансфер</th><th>Алкоголь</th><th>След. день</th><th>Ночёвка</th><th>Диета</th></tr></thead><tbody>`;
          compSnap.forEach(c => {
            const comp = c.data();
            html += `<tr>
              <td><strong>${comp.name || '—'}</strong></td>
              <td>${comp.transfer || '—'}</td>
              <td>${comp.alcohol || '—'}</td>
              <td>${comp.nextDay || '—'}</td>
              <td>${comp.overnight || '—'}</td>
              <td>${comp.diet || '—'}</td>
            </tr>`;
          });
          html += `</tbody></table>`;
        } else {
          html += `<p><em>Дополнительные анкеты не добавлены</em></p>`;
        }
        html += `</div>`;
      }
      container.innerHTML = html;
    } catch (err) { container.innerHTML = `<p>Ошибка: ${err.message}</p>`; }
  }
  loadAllGuests();
</script>
</body>
</html>
