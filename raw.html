<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Сырые данные из Firebase</title>
  <style>pre { background: #f4f4f4; padding: 20px; overflow-x: auto; }</style>
</head>
<body>
<h1>Сырые данные всех гостей:</h1>
<pre id="output">Загрузка...</pre>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  async function showRaw() {
    const out = document.getElementById('output');
    try {
      const snapshot = await db.collection("guests").get();
      if (snapshot.empty) {
        out.innerText = 'Нет документов';
        return;
      }
      let data = {};
      snapshot.forEach(doc => {
        data[doc.id] = doc.data();
      });
      out.innerText = JSON.stringify(data, null, 2);
    } catch (err) {
      out.innerText = 'Ошибка: ' + err.message;
    }
  }
  showRaw();
</script>
</body>
</html>
